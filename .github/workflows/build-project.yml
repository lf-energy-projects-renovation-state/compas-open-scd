name: Build Project

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - 'main'

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          submodules: 'true'

      - name: Cache Docker Register
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ hashFiles('**/Dockerfile') }}

      - name: Set up Docker Buildx
        id: buildx
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd #v4.0.0
      - name: Use Node.js 20.x
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: '20.x'

      - name: Test application with npm
        timeout-minutes: 45
        if: ${{ github.event_name == 'push' }}
        run: |
          npm ci
          npm run-script build
          cd packages/compas-open-scd
          npm run-script test

      - name: Build application with npm
        if: ${{ github.event_name == 'pull_request' }}
        timeout-minutes: 45
        run: |
          npm ci
          npm run-script build
      - name: Build docker image
        if: ${{ github.event_name == 'pull_request' }}
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f #v7.1.0
        with:
          # Set the context to use the packages/compas-open-scd directory and not execute it's own git checkout.
          context: packages/compas-open-scd
          push: false
